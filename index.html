<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুরক্ষিত লিংক লকার</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #202124;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #5f6368;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #1a73e8;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #155cb4;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 6px;
            display: none;
        }
        .share-url {
            background: #fff;
            padding: 12px;
            border: 1px solid #1a73e8;
            border-radius: 4px;
            word-break: break-all;
            font-size: 14px;
            color: #1a73e8;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .error {
            color: #d93025;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="create-panel" style="display: none;">
        <h2>🔗 সুরক্ষিত লিংক তৈরি করুন</h2>
        <div class="form-group">
            <label for="target-url">আপনার আসল লিংক:</label>
            <input type="text" id="target-url" placeholder="https://example.com">
        </div>
        <div class="form-group">
            <label for="target-password">পাসওয়ার্ড দিন:</label>
            <input type="password" id="target-password" placeholder="গোপন পাসওয়ার্ড">
        </div>
        <button onclick="generateLink()">লক করা লিংক তৈরি করুন</button>

        <div class="result-box" id="result-box">
            <p style="color: #137333; font-weight: bold; margin-top: 0; text-align: center;">✔ লিংক তৈরি হয়েছে (নিচে ক্লিক করে কপি করুন):</p>
            <div class="share-url" id="generated-url" onclick="copyToClipboard()"></div>
            <p style="font-size: 11px; color: #5f6368; margin: 0; text-align: center;">(এই লিংকটি যাকে পাঠাবেন সে সরাসরি আপনার পাসওয়ার্ড পেজ দেখতে পাবে)</p>
        </div>
    </div>

    <div id="unlock-panel" style="display: none;">
        <h2>🔒 এই লিংকটি পাসওয়ার্ড সুরক্ষিত</h2>
        <p style="text-align: center; color: #5f6368; font-size: 14px;">মূল কনটেন্টে প্রবেশ করতে সঠিক পাসওয়ার্ডটি দিন।</p>
        <div class="form-group">
            <label for="input-password">পাসওয়ার্ড লিখুন:</label>
            <input type="password" id="input-password" placeholder="পাসওয়ার্ড দিন">
        </div>
        <button onclick="verifyPassword()" style="background-color: #28a745;">কনফার্ম করুন</button>
        <div id="error-msg" class="error" style="display: none;">❌ ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</div>
    </div>
</div>

<script>
    let encryptedData = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        encryptedData = urlParams.get('p');

        if (encryptedData) {
            document.getElementById('unlock-panel').style.display = 'block';
        } else {
            document.getElementById('create-panel').style.display = 'block';
        }
    };

    function generateLink() {
        let url = document.getElementById('target-url').value.trim();
        const password = document.getElementById('target-password').value.trim();

        if (!url || !password) {
            alert("অনুগ্রহ করে লিংক এবং পাসওয়ার্ড দুটিই দিন!");
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        // শুধুমাত্র পাসওয়ার্ড এবং লিংকের শেষ অংশ এনকোড করা হচ্ছে যেন লিংক খুব বেশি বড় না হয়
        const dataToEncode = JSON.stringify({ u: url, p: password });
        const encoded = btoa(unescape(encodeURIComponent(dataToEncode)));

        const currentCleanUrl = window.location.href.split('?')[0];
        const finalUrl = currentCleanUrl + "?p=" + encoded;

        document.getElementById('generated-url').innerText = finalUrl;
        document.getElementById('result-box').style.display = 'block';
    }

    function verifyPassword() {
        const inputPass = document.getElementById('input-password').value;
        const errorMsg = document.getElementById('error-msg');

        try {
            const decodedData = JSON.parse(decodeURIComponent(escape(atob(encryptedData))));
            
            if (inputPass === decodedData.p) {
                errorMsg.style.display = 'none';
                window.location.href = decodedData.u;
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (e) {
            alert("লিংকটি সঠিক নয়!");
        }
    }

    // সহজে লিংক কপি করার জন্য ফাংশন
    function copyToClipboard() {
        const text = document.getElementById('generated-url').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("🔗 লিংকটি কপি করা হয়েছে!");
        });
    }
</script>

</body>
</html>
