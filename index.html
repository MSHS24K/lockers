<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link Locker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #202124;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #5f6368;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #1a73e8;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #155cb4;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 6px;
            display: none;
        }
        .share-url {
            background: #fff;
            padding: 12px;
            border: 1px solid #1a73e8;
            border-radius: 4px;
            word-break: break-all;
            font-size: 14px;
            color: #1a73e8;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .copy-status {
            color: #137333; 
            font-weight: bold; 
            margin-top: 0; 
            text-align: center;
            font-size: 15px;
        }
        .error {
            color: #d93025;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="create-panel" style="display: none;">
        <h2>🔗 Create Protected Link</h2>
        <div class="form-group">
            <label for="target-url">Target URL (Your Link):</label>
            <input type="text" id="target-url" placeholder="https://example.com">
        </div>
        <div class="form-group">
            <label for="target-password">Set Password:</label>
            <input type="password" id="target-password" placeholder="Enter secret password">
        </div>
        <button onclick="generateLink()">Generate & Copy Link</button>

        <div class="result-box" id="result-box">
            <p class="copy-status">✔ Link Generated & Copied to Clipboard!</p>
            <div class="share-url" id="generated-url"></div>
            <p style="font-size: 11px; color: #5f6368; margin: 0; text-align: center;">(You can now directly paste [Ctrl+V] and share this link anywhere)</p>
        </div>
    </div>

    <div id="unlock-panel" style="display: none;">
        <h2>🔒 Password Protected</h2>
        <p style="text-align: center; color: #5f6368; font-size: 14px;">Enter the correct password to access the destination URL.</p>
        <div class="form-group">
            <label for="input-password">Password:</label>
            <input type="password" id="input-password" placeholder="Enter password">
        </div>
        <button onclick="verifyPassword()" style="background-color: #28a745;">Unlock Link</button>
        <div id="error-msg" class="error" style="display: none;">❌ Incorrect password! Please try again.</div>
    </div>
</div>

<script>
    let encryptedData = "";

    // Check URL parameters on load
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        encryptedData = urlParams.get('p');

        if (encryptedData) {
            document.getElementById('unlock-panel').style.display = 'block';
        } else {
            document.getElementById('create-panel').style.display = 'block';
        }
    };

    // Generate link and auto-copy
    function generateLink() {
        let url = document.getElementById('target-url').value.trim();
        const password = document.getElementById('target-password').value.trim();

        if (!url || !password) {
            alert("Please fill in both the URL and Password fields!");
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }

        // Encode data to base64
        const dataToEncode = JSON.stringify({ u: url, p: password });
        const encoded = btoa(unescape(encodeURIComponent(dataToEncode)));

        const currentCleanUrl = window.location.href.split('?')[0];
        const finalUrl = currentCleanUrl + "?p=" + encoded;

        // Display the URL
        document.getElementById('generated-url').innerText = finalUrl;
        document.getElementById('result-box').style.display = 'block';

        // Auto Copy to Clipboard functionality
        autoCopyToClipboard(finalUrl);
    }

    // Password Verification
    function verifyPassword() {
        const inputPass = document.getElementById('input-password').value;
        const errorMsg = document.getElementById('error-msg');

        try {
            const decodedData = JSON.parse(decodeURIComponent(escape(atob(encryptedData))));
            
            if (inputPass === decodedData.p) {
                errorMsg.style.display = 'none';
                window.location.href = decodedData.u;
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (e) {
            alert("Invalid or corrupted link!");
        }
    }

    // Helper function for automatic copying
    function autoCopyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).catch(err => {
                console.error("Failed to copy automatically: ", err);
            });
        } else {
            // Fallback for older browsers
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
        }
    }
</script>

</body>
</html>
